<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCT -Mimecast Analyzer</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">


<style>


:root{

--bg:#f6f7f9;
--border:#e5e7eb;
--blue:#2563eb;
--green:#16a34a;
--red:#dc2626;

}


*{

box-sizing:border-box;

}


body{

margin:0;

font-family:Inter;

background:var(--bg);

color:#111;

overflow-x:hidden;

}



header{

height:60px;

background:white;

border-bottom:1px solid var(--border);

display:flex;

align-items:center;

padding:0 25px;

}



.logo{

width:32px;

height:32px;

background:#2563eb;

border-radius:8px;

margin-right:12px;

}



.layout{


display:grid;

grid-template-columns:280px minmax(0,1fr);

height:calc(100vh - 60px);

}




.sidebar{


background:white;

border-right:1px solid var(--border);

padding:20px;

overflow:auto;

}




label{

font-size:12px;

color:#6b7280;

}



input,select{


width:100%;

height:38px;

border:1px solid var(--border);

border-radius:8px;

padding:8px;

margin:6px 0 15px;

font-family:JetBrains Mono;

}




button{


width:100%;

height:40px;

border:none;

border-radius:8px;

background:#2563eb;

color:white;

cursor:pointer;

margin-bottom:10px;

}




.workspace{


padding:25px;

display:grid;

grid-template-columns:minmax(0,1fr) 280px;

gap:20px;

max-width:1400px;

width:100%;

margin:auto;

overflow:hidden;

}





.card,
.security-panel{


background:white;

border:1px solid var(--border);

border-radius:12px;

padding:18px;

margin-bottom:20px;

overflow:hidden;

}




.message-content{


word-break:break-word;

overflow-wrap:anywhere;

}




pre{


background:#111;

color:white;

padding:15px;

border-radius:10px;


white-space:pre-wrap;

word-break:break-word;

overflow-wrap:anywhere;

max-height:350px;

overflow:auto;

font-size:12px;


}





.security{


display:flex;

gap:10px;

flex-wrap:wrap;

}




.sec{


flex:1;

min-width:70px;

background:#f9fafb;

border-radius:10px;

padding:15px;

text-align:center;

}




.pass{


background:#16a34a;

color:white;

padding:5px 10px;

border-radius:20px;

font-size:12px;

}



.fail{


background:#dc2626;

color:white;

padding:5px 10px;

border-radius:20px;

font-size:12px;

}





.status{

margin-top:15px;

display:flex;

align-items:center;

gap:8px;

font-size:14px;

}



.dot{


width:9px;

height:9px;

background:#aaa;

border-radius:50%;

}



.ok{


background:#16a34a;

}





@media(max-width:1000px){


.layout{

grid-template-columns:1fr;

}


.sidebar{

border-right:none;

}


.workspace{

grid-template-columns:1fr;

}


}



</style>

</head>




<body>



<header>


<div class="logo"></div>

<h2>
OCT - Email Security Analyzer
</h2>


</header>






<div class="layout">



<div class="sidebar">


<label>
Client ID
</label>

<input id="clientId">



<label>
Client Secret
</label>

<input id="clientSecret" type="password">



<label>
Region
</label>


<select id="baseUrl">


<option value="https://api.services.mimecast.com">
US
</option>


<option value="https://uk-api.services.mimecast.com">
UK
</option>


</select>





<label>
Sender
</label>

<input id="domain">



<label>
Start
</label>

<input id="start" type="date">



<label>
End
</label>

<input id="end" type="date">





<button onclick="connect()">
Connect
</button>


<button onclick="searchMessages()">
Analyze
</button>





<div class="status">


<span id="dot" class="dot"></span>

<span id="status">
Disconnected
</span>


</div>


</div>








<div class="workspace">



<div>



<div class="card">


<h3>
Email Details
</h3>


<div id="messageList">

Waiting...

</div>


</div>






<div class="card">


<h3>
Email Security Headers
</h3>



<pre id="headers">

No data

</pre>



</div>







<div class="card">


<h3>
Raw API Response
</h3>


<pre id="raw">

No data

</pre>



</div>



</div>








<div class="security-panel">


<h3>
Security Status
</h3>


<div id="security">

No data

</div>



</div>





</div>



<footer style="text-align: center; padding: 20px; background-color: #f0f0f0; margin-top: 20px;">
  <p>&copy; 2026 OCT -Email Security Analyzer.Developed by Raghu.Sattu.</p>
</footer>
</div>








<script>



const API="http://localhost:5000";





// ==========================
// LOAD SAVED DATA
// ==========================


window.onload=()=>{


let saved =
JSON.parse(
localStorage.getItem("mimecastConfig")
);



if(saved){


clientId.value=saved.clientId || "";

clientSecret.value=saved.clientSecret || "";

baseUrl.value=saved.baseUrl || "";

domain.value=saved.domain || "";

start.value=saved.start || "";

end.value=saved.end || "";

}


};







function save(){


localStorage.setItem(

"mimecastConfig",

JSON.stringify({


clientId:clientId.value,

clientSecret:clientSecret.value,

baseUrl:baseUrl.value,

domain:domain.value,

start:start.value,

end:end.value


})

);


}







// TOKEN

async function connect(){


save();



try{


let res =
await fetch(API+"/api/token",{


method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({


clientId:clientId.value,

clientSecret:clientSecret.value,

baseUrl:baseUrl.value


})


});



let data =
await res.json();




if(!data.access_token){


throw new Error("Token failed");


}



localStorage.setItem(

"mimecastToken",

data.access_token

);




document.getElementById("status")
.innerHTML =
"Connected";



document.getElementById("dot")
.className =
"dot ok";



}

catch(err){


document.getElementById("status")
.innerHTML =
"Connection Failed";



console.log(err);


}



}








async function searchMessages(){



save();



let token =
localStorage.getItem(
"mimecastToken"
);



let res =
await fetch(API+"/api/search",{


method:"POST",

headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


token,

baseUrl:baseUrl.value,

value:domain.value,

start:start.value,

end:end.value


})


});



let data =
await res.json();



render(data);



}








function render(data){



let msg =

data.messageInfo
?.data?.[0]
?.recipientInfo
?.messageInfo;



if(!msg){

return;

}





messageList.innerHTML=


`

<p>
<b>Subject:</b>
${msg.subject}
</p>


<br>


<p>
<b>From:</b>
${msg.fromHeader}
</p>


<br>


<p>
<b>To:</b>
${msg.to}
</p>

`;





headers.innerHTML=
msg.transmissionInfo;



raw.innerHTML=
JSON.stringify(data,null,2);





let h =
msg.transmissionInfo;



security.innerHTML=


`

<div class="security">


<div class="sec">

SPF

<br><br>

<span class="${h.includes("spf=pass")?'pass':'fail'}">

${h.includes("spf=pass")?'PASS':'FAIL'}

</span>


</div>




<div class="sec">

DKIM

<br><br>

<span class="${h.includes("dkim=pass")?'pass':'fail'}">

${h.includes("dkim=pass")?'PASS':'FAIL'}

</span>


</div>






<div class="sec">

DMARC

<br><br>

<span class="${h.includes("dmarc=pass")?'pass':'fail'}">

${h.includes("dmarc=pass")?'PASS':'FAIL'}

</span>


</div>


</div>


`;



}





</script>




</body>
</html>
